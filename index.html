<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StudyPath Pro</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyPath">
<meta name="theme-color" content="#0f9e70">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/0f9e70/ffffff?text=SP">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#0f9e70;--gd:#0a7a56;--gl:#e6f7f1;--gm:#b8e8d4;
  --bg:#f5f9f7;--white:#fff;--text:#1a2e25;--muted:#7a9e8e;
  --border:#d8ece4;--r:14px;
}
body{font-family:'Plus Jakarta Sans','Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.screen{display:none;position:fixed;inset:0;background:var(--bg);overflow-y:auto;z-index:1;}
.screen.active{display:block;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0f9e70,#0a7a56);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(15,158,112,.28);}
.hdr-back{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-size:19px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-icons{display:flex;gap:8px;flex-shrink:0;}
.hdr-icon{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* SUBJECT BAR */
.sub-bar-wrap{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:68px;z-index:40;}
.sub-bar{display:flex;overflow-x:auto;padding:10px 14px;gap:8px;scrollbar-width:none;align-items:center;}
.sub-bar::-webkit-scrollbar{display:none;}
.s-tab{padding:8px 16px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--gl);border:1.5px solid var(--border);color:var(--muted);transition:.18s;flex-shrink:0;user-select:none;}
.s-tab.active{background:var(--g);border-color:var(--g);color:#fff;box-shadow:0 3px 10px rgba(15,158,112,.3);}
.s-count{font-size:10px;font-weight:700;margin-left:4px;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,.25);}
.s-tab:not(.active) .s-count{background:var(--gm);color:var(--gd);}
.add-sub-btn{width:36px;height:36px;border-radius:50%;border:2px dashed var(--g);background:transparent;color:var(--g);font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.18s;}
.add-sub-btn:hover{background:var(--gl);}

.sec-hdr{padding:14px 18px 6px;display:flex;align-items:center;justify-content:space-between;}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.cnt-badge{background:var(--gl);color:var(--gd);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700;}

.topics-list{padding:4px 14px 120px;}

/* TOPIC CARD */
.t-card{background:#fff;border-radius:var(--r);padding:14px 14px 14px 18px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 1px 5px rgba(15,158,112,.06);position:relative;overflow:hidden;transition:.18s;}
.t-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--g);border-radius:4px 0 0 4px;}
.t-card.done-card::before{background:#22c55e;}
.t-card:active{transform:scale(.98);}
.t-icon{width:42px;height:42px;border-radius:12px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.t-card.done-card .t-icon{background:#dcfce7;}
.t-body{flex:1;min-width:0;}
.t-name{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block;flex-shrink:0;}
.dot.full{background:#22c55e;}.dot.part{background:#f59e0b;}
.t-pills{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.tp{padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600;background:var(--gl);color:var(--gd);border:1px solid var(--gm);}
.tp.tdone{background:#dcfce7;color:#166534;border-color:#86efac;}
.ring-wrap{position:relative;width:40px;height:40px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--gd);}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-ico{font-size:50px;margin-bottom:12px;}
.empty-t{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}

/* FAB */
.fab{position:fixed;right:22px;bottom:28px;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;font-size:28px;cursor:pointer;box-shadow:0 6px 20px rgba(15,158,112,.45);z-index:200;display:flex;align-items:center;justify-content:center;transition:.22s cubic-bezier(.34,1.56,.64,1);}
.fab:hover{transform:scale(1.1) rotate(90deg);}

/* PROMPT MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(5px);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:26px 22px 20px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .28s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.m-title{font-size:17px;font-weight:800;margin-bottom:4px;}
.m-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.m-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;color:var(--text);outline:none;transition:border-color .2s;}
.m-input:focus{border-color:var(--g);}
.m-btns{display:flex;gap:10px;margin-top:14px;}
.m-cancel{flex:1;padding:12px;border:2px solid var(--border);background:#fff;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
.m-ok{flex:2;padding:12px;background:var(--g);border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;}

/* ── DETAIL SCREEN ── */
.d-body{padding:0 0 100px;}

/* Row style matching reference screenshot */
.d-row{display:flex;align-items:flex-start;gap:14px;padding:15px 18px;border-bottom:1px solid var(--border);background:#fff;cursor:default;}
.d-row.clickable{cursor:pointer;}
.d-row.clickable:active{background:var(--gl);}
.d-row-ico{font-size:18px;width:26px;text-align:center;flex-shrink:0;padding-top:2px;}
.d-row-main{flex:1;min-width:0;}
.d-row-title{font-size:16px;font-weight:600;color:var(--text);}
.d-row-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.d-row-right{flex-shrink:0;display:flex;align-items:center;gap:8px;}

/* Notes */
.notes-area{width:100%;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--text);line-height:1.6;resize:none;background:transparent;min-height:60px;}
.notes-area::placeholder{color:var(--muted);}

/* Subtasks section */
.st-section{background:#fff;border-bottom:1px solid var(--border);}
.st-hdr{display:flex;align-items:center;gap:14px;padding:15px 18px 12px;border-bottom:1px solid var(--border);}
.st-hdr-ico{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.st-hdr-title{font-size:16px;font-weight:600;flex:1;}
.st-add-btn{background:#222;color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.st-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--gl);cursor:pointer;transition:background .15s;}
.st-row:last-child{border-bottom:none;}
.st-row:active{background:var(--gl);}
.chk-circle{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.18s;}
.chk-circle.on{background:var(--g);border-color:var(--g);}
.chk-circle.on::after{content:'✓';color:#fff;font-size:13px;font-weight:900;}
.st-label{font-size:15px;font-weight:500;flex:1;}
.st-label.done{text-decoration:line-through;color:var(--muted);}

/* Priority */
.pri-opts{display:flex;gap:20px;padding:8px 0 10px;}
.p-opt{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:14px;font-weight:500;}
.p-radio{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.18s;}
.p-radio.sel{border-color:var(--g);}
.p-radio.sel::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--g);display:block;}

/* Round checkmark rows */
.chk-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--border);background:#fff;cursor:pointer;}
.chk-row:active{background:var(--gl);}
.round-chk{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.18s;}
.round-chk.on{background:var(--g);border-color:var(--g);}
.round-chk.on::after{content:'✓';color:#fff;font-size:14px;font-weight:900;}
.chk-body{flex:1;}
.chk-title{font-size:15px;font-weight:600;}
.chk-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* Toggle */
.toggle{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-thumb{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* Tags */
.tags-area{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding-top:8px;}
.tag-chip{background:var(--gl);color:var(--gd);border:1px solid var(--gm);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.tag-x{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}
.tag-inp{border:none;outline:none;font-family:inherit;font-size:13px;background:transparent;color:var(--text);min-width:90px;}

/* Save FAB (yellow) */
.save-fab{position:fixed;right:22px;bottom:28px;width:60px;height:60px;border-radius:50%;background:#f59e0b;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 6px 20px rgba(245,158,11,.5);z-index:200;display:flex;align-items:center;justify-content:center;transition:.22s;}
.save-fab:hover{transform:scale(1.1);}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <header class="hdr">
    <div class="hdr-title">📚 StudyPath Pro</div>
    <div class="hdr-icons">
      <button class="hdr-icon" id="statsBtn" style="font-size:12px;font-weight:700;width:auto;padding:0 10px;border-radius:20px;">✅ 0/0</button>
    </div>
  </header>

  <div class="sub-bar-wrap">
    <div class="sub-bar" id="subBar">
      <button class="add-sub-btn" id="addSubBtn" title="नया विषय जोड़ें">+</button>
    </div>
  </div>

  <div class="sec-hdr">
    <span class="sec-title" id="secTitle">Topics</span>
    <span class="cnt-badge" id="cntBadge">0</span>
  </div>
  <div class="topics-list" id="topicsList"></div>
  <button class="fab" id="addTopicFab" title="नया टॉपिक जोड़ें">+</button>
</div>

<!-- DETAIL SCREEN -->
<div class="screen" id="detailScreen">
  <header class="hdr">
    <button class="hdr-back" id="detailBack">←</button>
    <div class="hdr-title" id="detailHdrTitle"></div>
    <div class="hdr-icons">
      <button class="hdr-icon">📅</button>
      <button class="hdr-icon">⬆</button>
      <button class="hdr-icon" id="deleteTopicBtn">🗑</button>
    </div>
  </header>
  <div class="d-body" id="detailBody"></div>
  <button class="save-fab" id="saveFab">✓</button>
</div>

<!-- PROMPT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div class="m-title" id="mTitle"></div>
    <div class="m-sub" id="mSub"></div>
    <input class="m-input" id="mInput">
    <div class="m-btns">
      <button class="m-cancel" id="mCancel">रद्द करें</button>
      <button class="m-ok" id="mOk">जोड़ें ✓</button>
    </div>
  </div>
</div>

<script>
// ════ DATA ════
let D = JSON.parse(localStorage.getItem('sp4')||'null') || {subjects:[]};
let curSub = 0, curTopic = null, promptCb = null, curTags = [];

const ST_DEFS = [
  {key:'read',  label:'📖 Reading / Video'},
  {key:'rev',   label:'🔄 Revision'},
  {key:'pyq',   label:'❓ PYQs'},
  {key:'mcq',   label:'🎯 MCQs'},
];

function save(){ localStorage.setItem('sp4', JSON.stringify(D)); }

function fmtTime(d){
  const h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0');
  return (h%12||12)+':'+m+' '+(h<12?'AM':'PM');
}

// ════ PROMPT ════
function showPrompt(title, sub, placeholder, okTxt, cb){
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mSub').textContent = sub;
  document.getElementById('mInput').placeholder = placeholder;
  document.getElementById('mInput').value = '';
  document.getElementById('mOk').textContent = okTxt+' ✓';
  promptCb = cb;
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('mInput').focus(), 120);
}
document.getElementById('mCancel').onclick = ()=>{ document.getElementById('modalBg').classList.remove('open'); promptCb=null; };
document.getElementById('mOk').onclick = doPrompt;
document.getElementById('mInput').onkeydown = e=>{ if(e.key==='Enter') doPrompt(); if(e.key==='Escape'){ document.getElementById('modalBg').classList.remove('open'); promptCb=null; } };
function doPrompt(){
  const v = document.getElementById('mInput').value.trim();
  document.getElementById('modalBg').classList.remove('open');
  if(promptCb && v) promptCb(v);
  promptCb = null;
}

// ════ HOME ════
function renderAll(){ renderSubBar(); renderTopics(); }

function renderSubBar(){
  const bar = document.getElementById('subBar');
  const addBtn = bar.querySelector('.add-sub-btn');
  bar.innerHTML = '';
  D.subjects.forEach((s,i)=>{
    const done = s.topics.filter(t=>t.subtasks.every(x=>x.done)).length;
    const tab = document.createElement('div');
    tab.className = 's-tab' + (i===curSub?' active':'');
    tab.innerHTML = s.name + `<span class="s-count">${done}/${s.topics.length}</span>`;
    tab.onclick = ()=>{ curSub=i; renderAll(); };
    bar.appendChild(tab);
  });
  bar.appendChild(addBtn);

  const totalT = D.subjects.reduce((a,s)=>a+s.topics.length,0);
  const totalD = D.subjects.reduce((a,s)=>a+s.topics.filter(t=>t.subtasks.every(x=>x.done)).length,0);
  document.getElementById('statsBtn').textContent = '✅ '+totalD+'/'+totalT;
}

function renderTopics(){
  const list = document.getElementById('topicsList');
  list.innerHTML = '';
  if(!D.subjects.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">📚</div><div class="empty-t">कोई विषय नहीं</div><p style="font-size:13px">ऊपर + बटन से विषय जोड़ें</p></div>`;
    document.getElementById('secTitle').textContent='Subjects';
    document.getElementById('cntBadge').textContent='0';
    return;
  }
  const s = D.subjects[curSub];
  document.getElementById('secTitle').textContent = s.name+' — Topics';
  document.getElementById('cntBadge').textContent = s.topics.length+' topics';
  if(!s.topics.length){
    list.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><div class="empty-t">कोई टॉपिक नहीं</div><p style="font-size:13px">नीचे + बटन से टॉपिक जोड़ें</p></div>`;
    return;
  }
  s.topics.forEach((t,i)=>{
    const done = t.subtasks.filter(x=>x.done).length;
    const pct = Math.round(done/t.subtasks.length*100);
    const full = pct===100;
    const R=16, C=2*Math.PI*R;
    const card = document.createElement('div');
    card.className = 't-card'+(full?' done-card':'');
    const pills = t.subtasks.map(st=>`<span class="tp${st.done?' tdone':''}">${st.label.split(' ')[0]}</span>`).join('');
    const status = full ? `Completed${t.completedAt?' today '+t.completedAt:''}` : done>0 ? `${done} of ${t.subtasks.length} done` : 'Not started';
    const dotCls = full?'full':done>0?'part':'';
    card.innerHTML = `
      <div class="t-icon">${full?'✅':'📖'}</div>
      <div class="t-body">
        <div class="t-name">${t.name}</div>
        <div class="t-status"><span class="dot ${dotCls}"></span>${status}${t.dueDate?' &nbsp;📅 '+t.dueDate:''}</div>
        <div class="t-pills">${pills}</div>
      </div>
      <div class="ring-wrap">
        <svg width="40" height="40">
          <circle cx="20" cy="20" r="${R}" fill="none" stroke="var(--gm)" stroke-width="3"/>
          <circle cx="20" cy="20" r="${R}" fill="none" stroke="${full?'#22c55e':'var(--g)'}" stroke-width="3" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C-(pct/100)*C}"/>
        </svg>
        <div class="ring-lbl">${pct}%</div>
      </div>`;
    card.onclick = ()=>openDetail(i);
    list.appendChild(card);
  });
}

// ════ ADD SUBJECT ════
document.getElementById('addSubBtn').onclick = ()=>{
  showPrompt('नया विषय जोड़ें','विषय का नाम लिखें','जैसे: राज GEO, History, ART','जोड़ें', name=>{
    D.subjects.push({name, topics:[]});
    curSub = D.subjects.length-1;
    save(); renderAll();
  });
};

// ════ ADD TOPIC ════
document.getElementById('addTopicFab').onclick = ()=>{
  if(!D.subjects.length){
    showPrompt('पहले विषय जोड़ें','विषय का नाम लिखें','जैसे: Geography','जोड़ें', name=>{
      D.subjects.push({name, topics:[]}); curSub=0; save(); renderAll();
    }); return;
  }
  showPrompt('नया टॉपिक जोड़ें','टॉपिक का नाम लिखें','जैसे: जलवायु, भौतिक प्रदेश','जोड़ें', name=>{
    D.subjects[curSub].topics.push({
      name, notes:'', tags:[], dueDate:'', priority:'none',
      reminder:false, highlight:false, completed:false, completedAt:'',
      allDay:false, createdAt: fmtTime(new Date()),
      subtasks: ST_DEFS.map(d=>({...d, done:false}))
    });
    save(); renderAll();
  });
};

// ════ DETAIL ════
function openDetail(idx){
  curTopic = idx;
  const t = D.subjects[curSub].topics[idx];
  curTags = Array.isArray(t.tags) ? [...t.tags] : [];
  document.getElementById('detailHdrTitle').textContent = t.name;
  buildDetail(t);
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('detailScreen').classList.add('active');
  document.getElementById('detailScreen').scrollTop = 0;
}

function buildDetail(t){
  const body = document.getElementById('detailBody');
  body.innerHTML = '';

  // 1. NOTES HEADER ROW
  const notesHdr = el('div','d-row');
  notesHdr.innerHTML = `<div class="d-row-ico">☰</div><div class="d-row-main"><div class="d-row-title">Notes</div><div class="d-row-sub">Tap to add notes</div></div>`;
  body.appendChild(notesHdr);

  // Notes textarea row
  const notesRow = el('div','d-row');
  notesRow.style.paddingTop='8px';
  const ta = document.createElement('textarea');
  ta.className='notes-area'; ta.id='dNotes'; ta.rows=3;
  ta.placeholder='यहाँ नोट्स लिखें...';
  ta.value = t.notes||'';
  notesRow.innerHTML='<div class="d-row-ico"></div><div class="d-row-main" style="flex:1;"></div>';
  notesRow.querySelector('.d-row-main').appendChild(ta);
  body.appendChild(notesRow);

  // 2. ATTACHMENT
  const attRow = el('div','d-row clickable');
  attRow.innerHTML = `
    <div class="d-row-ico">📷</div>
    <div class="d-row-main"><div class="d-row-title">Attachment</div></div>
    <div class="d-row-right">
      <label style="cursor:pointer;font-size:22px;line-height:1;">🖼<input type="file" style="display:none" accept="image/*,application/pdf"></label>
      <label style="cursor:pointer;font-size:22px;line-height:1;">📷<input type="file" style="display:none" accept="image/*" capture="environment"></label>
    </div>`;
  body.appendChild(attRow);

  // 3. SUBTASKS
  const stSec = el('div','st-section');
  const stHdr = el('div','st-hdr');
  stHdr.innerHTML = `<div class="st-hdr-ico">☰</div><div class="st-hdr-title">Sub Tasks</div>`;
  const stAddBtn = document.createElement('button');
  stAddBtn.className='st-add-btn'; stAddBtn.textContent='+';
  stAddBtn.onclick = ()=>{
    showPrompt('नया Sub-Task','नाम लिखें','जैसे: Write summary','जोड़ें', name=>{
      t.subtasks.push({key:'c'+Date.now(), label:'📌 '+name, done:false});
      save(); rebuildSubtasks(t);
    });
  };
  stHdr.appendChild(stAddBtn);
  stSec.appendChild(stHdr);
  const stList = el('div',''); stList.id='stList';
  stSec.appendChild(stList);
  body.appendChild(stSec);
  rebuildSubtasks(t);

  // 4. LIST (Subject name)
  const listRow = el('div','d-row');
  listRow.innerHTML = `<div class="d-row-ico" style="color:var(--g)">☰</div><div class="d-row-main"><div class="d-row-title">List</div><div class="d-row-sub">${D.subjects[curSub].name}</div></div>`;
  body.appendChild(listRow);

  // 5. TAGS
  const tagsRow = el('div','d-row');
  tagsRow.style.flexDirection='column';tagsRow.style.alignItems='stretch';
  const tagsTop = el('div','');
  tagsTop.style.cssText='display:flex;align-items:center;gap:14px;';
  tagsTop.innerHTML=`<div class="d-row-ico">🏷</div><div class="d-row-main"><div class="d-row-title">Tags</div><div class="d-row-sub">No tags selected</div></div>`;
  const addTagBtn = document.createElement('button');
  addTagBtn.style.cssText='background:#222;color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;';
  addTagBtn.textContent='+';
  addTagBtn.onclick=()=>{ const inp=document.getElementById('tagInp'); if(inp) inp.focus(); };
  tagsTop.appendChild(addTagBtn);
  tagsRow.appendChild(tagsTop);
  const tagsInner = el('div','');
  tagsInner.style.cssText='padding:0 0 4px 40px;';
  tagsInner.innerHTML=`<div class="tags-area" id="tagsArea"></div>`;
  tagsRow.appendChild(tagsInner);
  body.appendChild(tagsRow);
  renderTagChips(t);

  // 6. DUE DATE
  const dateRow = el('div','d-row clickable');
  dateRow.id='dateRow';
  const allDayOn = t.allDay||false;
  dateRow.innerHTML = `
    <div class="d-row-ico">⏰</div>
    <div class="d-row-main"><div class="d-row-title">Due Date</div><div class="d-row-sub" id="dueSub">${t.dueDate||'No reminder set'}</div></div>
    <div class="d-row-right" style="flex-direction:column;align-items:flex-end;gap:4px;">
      <div style="font-size:11px;color:var(--muted)">All Day</div>
      <div class="toggle" id="allDayTog" style="background:${allDayOn?'var(--g)':'var(--border)'};">
        <div class="toggle-thumb" style="left:${allDayOn?'21':'3'}px;"></div>
      </div>
    </div>`;
  dateRow.querySelector('.d-row-main').onclick=()=>{
    const inp=document.createElement('input'); inp.type='date';
    inp.style.cssText='position:fixed;opacity:0;z-index:9999;top:50%;left:50%;width:1px;height:1px;';
    inp.value=t.dueDate||'';
    document.body.appendChild(inp);
    inp.onchange=()=>{ t.dueDate=inp.value; const s=document.getElementById('dueSub'); if(s) s.textContent=t.dueDate||'No reminder set'; save(); document.body.removeChild(inp); };
    inp.focus(); inp.click(); setTimeout(()=>{ try{document.body.removeChild(inp);}catch(e){} },5000);
  };
  document.getElementById && setTimeout(()=>{
    const tog=document.getElementById('allDayTog');
    if(tog) tog.onclick=()=>{
      t.allDay=!t.allDay; save();
      tog.style.background=t.allDay?'var(--g)':'var(--border)';
      tog.querySelector('.toggle-thumb').style.left=t.allDay?'21px':'3px';
    };
  },50);
  body.appendChild(dateRow);

  // 7. REMINDER
  const remRow = el('div','d-row clickable');
  remRow.innerHTML=`<div class="d-row-ico" id="remIco">${t.reminder?'🔔':'🔕'}</div><div class="d-row-main"><div class="d-row-title">Reminder</div><div class="d-row-sub" id="remSub">${t.reminder?'Reminder set':"Don't remind me"}</div></div>`;
  remRow.onclick=()=>{ t.reminder=!t.reminder; document.getElementById('remIco').textContent=t.reminder?'🔔':'🔕'; document.getElementById('remSub').textContent=t.reminder?'Reminder set':"Don't remind me"; save(); };
  body.appendChild(remRow);

  // 8. PRIORITY
  const priRow = el('div','d-row');
  priRow.style.flexDirection='column';priRow.style.alignItems='stretch';
  const priTop = el('div','');
  priTop.style.cssText='display:flex;align-items:center;gap:14px;';
  priTop.innerHTML=`<div class="d-row-ico">🚩</div><div class="d-row-main"><div class="d-row-title">Priority <span style="font-size:13px;color:var(--muted);font-weight:400;" id="priLabel">${t.priority==='none'?'None':t.priority}</span></div></div>`;
  priRow.appendChild(priTop);
  const priOpts = el('div','');
  priOpts.style.cssText='padding:8px 0 10px 40px;';
  const opts=[{v:'none',ico:'🏴',label:''},{v:'Low',ico:'🟡',label:'Low'},{v:'Medium',ico:'🟠',label:'Med'},{v:'High',ico:'🔴',label:'High'}];
  priOpts.innerHTML='<div class="pri-opts">'+opts.map(o=>`<div class="p-opt" onclick="setPri('${o.v}')"><div class="p-radio${t.priority===o.v?' sel':''}" id="pr_${o.v}"></div><span>${o.ico}</span></div>`).join('')+'</div>';
  priRow.appendChild(priOpts);
  body.appendChild(priRow);

  // 9. HIGHLIGHT
  const hlRow = el('div','chk-row');
  hlRow.innerHTML=`<div class="round-chk${t.highlight?' on':''}" id="hlChk"></div><div class="chk-body"><div class="chk-title">★ Highlight</div><div class="chk-sub">Make this task stand out in the list view</div></div><span style="font-size:22px;">🎨</span>`;
  hlRow.onclick=()=>{ t.highlight=!t.highlight; document.getElementById('hlChk').className='round-chk'+(t.highlight?' on':''); save(); };
  body.appendChild(hlRow);

  // 10. COMPLETED
  const doneRow = el('div','chk-row');
  doneRow.innerHTML=`<div class="round-chk${t.completed?' on':''}" id="doneChk"></div><div class="chk-body"><div class="chk-title">Completed</div><div class="chk-sub" id="doneSub">${t.completed&&t.completedAt?'Completed today '+t.completedAt:'Mark as complete'}</div></div>`;
  doneRow.onclick=()=>{
    t.completed=!t.completed;
    if(t.completed&&!t.completedAt) t.completedAt=fmtTime(new Date());
    if(!t.completed) t.completedAt='';
    document.getElementById('doneChk').className='round-chk'+(t.completed?' on':'');
    document.getElementById('doneSub').textContent=t.completed&&t.completedAt?'Completed today '+t.completedAt:'Mark as complete';
    save();
  };
  body.appendChild(doneRow);

  // 11. CREATED
  const creRow = el('div','d-row');
  creRow.innerHTML=`<div class="d-row-ico">📅</div><div class="d-row-main"><div class="d-row-title">Created</div><div class="d-row-sub">today ${t.createdAt||'—'}</div></div>`;
  body.appendChild(creRow);
}

function el(tag, cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

function rebuildSubtasks(t){
  const list=document.getElementById('stList');
  if(!list) return;
  list.innerHTML='';
  t.subtasks.forEach((st,i)=>{
    const row=el('div','st-row');
    row.innerHTML=`<div class="chk-circle${st.done?' on':''}" id="stc${i}"></div><div class="st-label${st.done?' done':''}" id="stl${i}">${st.label}</div>`;
    row.onclick=()=>{
      st.done=!st.done;
      document.getElementById('stc'+i).className='chk-circle'+(st.done?' on':'');
      document.getElementById('stl'+i).className='st-label'+(st.done?' done':'');
      const tObj=D.subjects[curSub].topics[curTopic];
      if(tObj.subtasks.every(s=>s.done)&&!tObj.completedAt){
        tObj.completed=true; tObj.completedAt=fmtTime(new Date());
        const dc=document.getElementById('doneChk');
        const ds=document.getElementById('doneSub');
        if(dc) dc.className='round-chk on';
        if(ds) ds.textContent='Completed today '+tObj.completedAt;
      }
      save();
    };
    list.appendChild(row);
  });
}

function setPri(v){
  if(curTopic===null) return;
  const t=D.subjects[curSub].topics[curTopic];
  t.priority=v;
  ['none','Low','Medium','High'].forEach(x=>{ const e=document.getElementById('pr_'+x); if(e) e.className='p-radio'+(x===v?' sel':''); });
  const lbl=document.getElementById('priLabel'); if(lbl) lbl.textContent=v==='none'?'None':v;
  save();
}

// Tags
function renderTagChips(t){
  const area=document.getElementById('tagsArea'); if(!area) return;
  const oldInp=document.getElementById('tagInp');
  area.innerHTML='';
  curTags.forEach((tag,i)=>{
    const chip=el('div','tag-chip');
    chip.innerHTML=tag+`<span class="tag-x" onclick="removeTag(${i})">×</span>`;
    area.appendChild(chip);
  });
  const inp=document.createElement('input');
  inp.className='tag-inp'; inp.id='tagInp'; inp.placeholder='Tag लिखें, Enter दबाएं';
  inp.onkeydown=e=>{
    if(e.key==='Enter'||e.key===','){
      e.preventDefault();
      const v=inp.value.trim().replace(',','');
      if(v&&!curTags.includes(v)){ curTags.push(v); renderTagChips(D.subjects[curSub].topics[curTopic]); }
      else inp.value='';
    }
  };
  area.appendChild(inp);
}
function removeTag(i){ curTags.splice(i,1); renderTagChips(D.subjects[curSub].topics[curTopic]); }

// Save & go back
function saveAndBack(){
  if(curTopic===null) return;
  const t=D.subjects[curSub].topics[curTopic];
  const notes=document.getElementById('dNotes'); if(notes) t.notes=notes.value;
  t.tags=[...curTags];
  save();
  document.getElementById('detailScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  renderAll();
}

document.getElementById('detailBack').onclick = saveAndBack;
document.getElementById('saveFab').onclick = saveAndBack;
document.getElementById('deleteTopicBtn').onclick = ()=>{
  if(!confirm('इस टॉपिक को डिलीट करें?')) return;
  D.subjects[curSub].topics.splice(curTopic,1);
  save();
  document.getElementById('detailScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  renderAll();
};

// INIT
renderAll();
</script>
</body>
</html>
